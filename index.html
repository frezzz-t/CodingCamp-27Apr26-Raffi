<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!--Dark Mode Button-->
    <button id="theme-switch">
      <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#c8c8c8"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
       <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#c8c8c8"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
    </button>
    <!-- Balance Display -->
    <header class="balance-section">
      <h1>Expense &amp; Budget Visualizer</h1>
      <p class="balance-label">Total Spent</p>
      <p class="balance-amount"><span id="balance">$0.00</span></p>
    </header>

    <main class="app-layout">
      <!-- Input Form -->
      <section class="form-section" aria-labelledby="form-heading">
        <h2 id="form-heading">Add Transaction</h2>
        <form id="add-form" novalidate>
          <div class="field-group">
            <label for="name-input">Item Name</label>
            <input
              type="text"
              id="name-input"
              name="name"
              placeholder="e.g. Groceries"
              autocomplete="off"
            />
            <span class="error" id="name-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field-group">
            <label for="amount-input">Amount ($)</label>
            <input
              type="number"
              id="amount-input"
              name="amount"
              min="0.01"
              step="0.01"
              placeholder="0.00"
            />
            <span class="error" id="amount-error" role="alert" aria-live="polite"></span>
          </div>

          <div class="field-group">
            <label for="category-select">Category</label>
            <select id="category-select" name="category">
              <option value="">Select category</option>
              <option value="Food">Food</option>
              <option value="Transport">Transport</option>
              <option value="Fun">Fun</option>
              <option id="opt-custom" value="__custom__">＋ Add custom…</option>
            </select>
            <div id="custom-category-group" class="custom-category-group" style="display:none;">
              <input
                type="text"
                id="custom-category-input"
                placeholder="Category name"
                autocomplete="off"
                maxlength="30"
              />
              <button type="button" id="add-custom-category-btn" aria-label="Confirm custom category">Add</button>
            </div>
            <span class="error" id="category-error" role="alert" aria-live="polite"></span>
          </div>

          <button type="submit">Add Transaction</button>
        </form>
      </section>

      <!-- Transaction List -->
      <section class="list-section" aria-labelledby="list-heading">
        <div class="list-header">
          <h2 id="list-heading">Transactions</h2>
          <div class="sort-control">
            <label for="sort-select">Sort:</label>
            <select id="sort-select" aria-label="Sort transactions">
              <option value="none">Default</option>
              <option value="amount-asc">Amount ↓</option>
              <option value="amount-desc">Amount ↑</option>
              <option value="category-asc">Category A–Z</option>
              <option value="category-desc">Category Z–A</option>
            </select>
          </div>
        </div>
        <ul id="transaction-list" aria-label="Transaction list"></ul>
      </section>
    </main>

    <!-- Chart Area -->
    <section class="chart-section" aria-labelledby="chart-heading">
      <h2 id="chart-heading">Spending by Category</h2>
      <div class="chart-container">
        <canvas id="pie-chart" width="300" height="300" aria-label="Spending pie chart" role="img">
          Your browser does not support the HTML canvas element. Please upgrade to a modern browser to view the spending chart.
        </canvas>
        <ul id="chart-summary" aria-label="Category spending summary"></ul>
      </div>
    </section>

    <script src="js/app.js"></script>
  </body>
</html>
